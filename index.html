<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Enablement Decks</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AI Enablement · Fourth" />
  <meta property="og:title" content="AI Enablement Decks &amp; Briefings" />
  <meta property="og:description" content="AI Enablement presentations, orientations, and capability briefings — Fourth." />
  <meta property="og:url" content="https://rev4nchist.github.io/ai-enablement-decks/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="AI Enablement Decks &amp; Briefings" />
  <meta name="twitter:description" content="AI Enablement presentations, orientations, and capability briefings — Fourth." />

  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:        #07091E;
      --bg-surface:     #0D1229;
      --bg-card:        #111530;
      --border:         rgba(255,255,255,0.07);
      --border-bright:  rgba(255,255,255,0.14);
      --text-primary:   #EEF2FF;
      --text-secondary: #8892B0;
      --text-muted:     #4A5580;
      --teal:           #00D4C8;
      --orange:         #FF8C42;
      --purple:         #7B6FF0;
      --green:          #4ADE80;
      --amber:          #FBBF24;
      --font-display:   'Clash Display', sans-serif;
      --font-body:      'Satoshi', sans-serif;
      --sidebar-w:      240px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 20% 0%, rgba(123,111,240,0.12), transparent 60%),
        radial-gradient(ellipse 600px 400px at 80% 100%, rgba(0,212,200,0.10), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      gap: clamp(2rem, 4vw, 4rem);
      padding: clamp(3rem, 6vw, 5rem) clamp(1.5rem, 4vw, 3rem);
    }

    /* ─── Sidebar / Table of Contents ─────────────────────────────── */
    .toc {
      position: sticky;
      top: 2rem;
      align-self: start;
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    .toc-label {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .toc-list { list-style: none; display: flex; flex-direction: column; gap: 0.15rem; border-left: 1px solid var(--border); }
    .toc-list a {
      display: block;
      padding: 0.55rem 1rem;
      margin-left: -1px;
      border-left: 2px solid transparent;
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .toc-list a:hover { color: var(--text-primary); background: rgba(255,255,255,0.02); }
    .toc-list a.active { color: var(--teal); border-left-color: var(--teal); background: rgba(0,212,200,0.06); }
    .toc-list a .count { float: right; font-size: 0.75rem; color: var(--text-muted); }

    /* ─── Main content ────────────────────────────────────────────── */
    main { min-width: 0; }

    header { margin-bottom: clamp(2rem, 4vw, 3rem); }

    .eyebrow {
      font-family: var(--font-display);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.25rem, 5vw, 4rem);
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #EEF2FF 0%, #8892B0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sub { font-size: clamp(1rem, 1.5vw, 1.15rem); color: var(--text-secondary); max-width: 42rem; }

    /* ─── Filter chips ────────────────────────────────────────────── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1.75rem 0 2.5rem;
    }
    .chip {
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 0.45rem 0.95rem;
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .chip:hover { color: var(--text-primary); border-color: var(--border-bright); }
    .chip.active {
      color: var(--teal);
      border-color: rgba(0,212,200,0.5);
      background: rgba(0,212,200,0.08);
    }
    .chip .n { color: var(--text-muted); margin-left: 0.4rem; font-size: 0.72rem; }
    .chip.active .n { color: var(--teal); opacity: 0.7; }

    /* ─── Sections ────────────────────────────────────────────────── */
    section.decks { margin-top: 2rem; scroll-margin-top: 2rem; }
    section.decks + section.decks { margin-top: 3rem; }
    section.decks.hidden { display: none; }

    .section-head {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .section-label {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .section-anchor {
      opacity: 0;
      font-family: var(--font-display);
      font-size: 0.85rem;
      color: var(--teal);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .section-head:hover .section-anchor { opacity: 1; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    /* ─── Cards ───────────────────────────────────────────────────── */
    .card {
      display: flex;
      flex-direction: column;
      padding: 1.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), border-color 0.3s, background 0.3s;
    }
    .card:hover { transform: translateY(-3px); border-color: var(--border-bright); background: var(--bg-surface); }
    .card.featured { background: linear-gradient(135deg, rgba(0,212,200,0.08) 0%, var(--bg-card) 55%); border-color: rgba(0,212,200,0.25); }
    .card.hidden { display: none; }
    .card.collapsed { display: none; }

    /* ─── Chronological collapsible section (Sponsor Updates) ──────── */
    .section-toggle {
      margin-top: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.5rem 1.1rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .section-toggle:hover { color: var(--text-primary); border-color: var(--border-bright); }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .card .tag {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      padding: 0.3rem 0.6rem;
      border: 1px solid rgba(0,212,200,0.25);
      border-radius: 999px;
    }
    .card .status {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .card .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .status.shipped  { color: var(--green);  background: rgba(74,222,128,0.10); }
    .status.in-build { color: var(--amber);  background: rgba(251,191,36,0.10); }
    .status.briefing { color: var(--purple); background: rgba(123,111,240,0.12); }
    .status.draft    { color: var(--text-muted); background: rgba(74,85,128,0.18); }

    .card h3 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    .card p { font-size: 0.925rem; color: var(--text-secondary); line-height: 1.55; flex: 1; }
    .card .meta {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .card .date { color: var(--text-secondary); font-variant-numeric: tabular-nums; }
    .card .arrow { color: var(--teal); font-family: var(--font-display); transition: transform 0.3s; }
    .card:hover .arrow { transform: translateX(3px); }

    .empty-state {
      padding: 3rem 2rem;
      border: 1px dashed var(--border-bright);
      border-radius: 14px;
      text-align: center;
      color: var(--text-secondary);
    }

    footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    footer a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--teal); }

    /* ─── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; gap: 2rem; }
      .toc { position: static; max-height: none; padding-right: 0; }
      .toc-list { flex-direction: row; flex-wrap: wrap; border-left: none; gap: 0.5rem; }
      .toc-list a { margin-left: 0; border: 1px solid var(--border); border-radius: 999px; padding: 0.4rem 0.85rem; }
      .toc-list a.active { border-color: rgba(0,212,200,0.4); }
      .toc-list a .count { display: none; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="toc" aria-label="Sections">
      <p class="toc-label">On this page</p>
      <ul class="toc-list" id="toc-list"></ul>
    </aside>

    <main>
      <header>
        <p class="eyebrow" id="site-eyebrow">AI Enablement Team</p>
        <h1 id="site-heading">Decks &amp; Briefings</h1>
        <p class="sub" id="site-tagline"></p>
      </header>

      <div class="filters" id="filters" role="tablist" aria-label="Filter decks by section"></div>

      <div id="sections"></div>

      <footer>
        <span>Built by the AI Enablement team · Fourth</span>
        <a href="https://github.com/Rev4nchist/ai-enablement-decks">View on GitHub →</a>
      </footer>
    </main>
  </div>

  <script>
    (async function () {
      const data = await fetch('./decks.json', { cache: 'no-cache' }).then(r => r.json());

      // ─── Header ────────────────────────────────────────────────
      document.title = data.site.title;
      document.getElementById('site-heading').textContent = data.site.heading;
      document.getElementById('site-tagline').textContent = data.site.tagline;

      // ─── Helpers ───────────────────────────────────────────────
      const fmtDate = (iso) => {
        if (!iso) return '';
        const parts = iso.split('-');
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const m = months[parseInt(parts[1], 10) - 1] || '';
        if (parts.length >= 3) return `${m} ${parseInt(parts[2], 10)}, ${parts[0]}`;
        if (parts.length === 2) return `${m} ${parts[0]}`;
        return iso;
      };
      const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => (
        { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
      ));
      const statusLabel = (s) => ({
        'shipped':'Shipped','in-build':'In Build','briefing':'Briefing','draft':'Draft'
      }[s] || s);

      // ─── Group decks by section ────────────────────────────────
      const bySection = Object.fromEntries(data.sections.map(s => [s.id, []]));
      data.decks.forEach(d => { if (bySection[d.section]) bySection[d.section].push(d); });

      // ─── ToC ───────────────────────────────────────────────────
      const tocList = document.getElementById('toc-list');
      data.sections.forEach(s => {
        const n = bySection[s.id].length;
        if (!n) return;
        const li = document.createElement('li');
        li.innerHTML = `<a href="#${esc(s.id)}" data-section="${esc(s.id)}">${esc(s.title)} <span class="count">${n}</span></a>`;
        tocList.appendChild(li);
      });

      // ─── Filter chips ──────────────────────────────────────────
      const filters = document.getElementById('filters');
      const allChip = document.createElement('button');
      allChip.className = 'chip active';
      allChip.dataset.filter = 'all';
      allChip.innerHTML = `All <span class="n">${data.decks.length}</span>`;
      filters.appendChild(allChip);
      data.sections.forEach(s => {
        const n = bySection[s.id].length;
        if (!n) return;
        const b = document.createElement('button');
        b.className = 'chip';
        b.dataset.filter = s.id;
        b.innerHTML = `${esc(s.title)} <span class="n">${n}</span>`;
        filters.appendChild(b);
      });

      // ─── Sections + cards ──────────────────────────────────────
      const sectionsEl = document.getElementById('sections');
      data.sections.forEach(s => {
        let decks = bySection[s.id];
        if (!decks.length) return;
        // Chronological sections (e.g. Sponsor Updates) render newest-first.
        if (s.chronological) {
          decks = decks.slice().sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
        }
        const section = document.createElement('section');
        section.className = 'decks';
        section.id = s.id;
        section.dataset.section = s.id;
        section.dataset.collapsible = s.collapsible ? '1' : '';

        section.innerHTML = `
          <div class="section-head">
            <p class="section-label">${esc(s.title)}</p>
            <a class="section-anchor" href="#${esc(s.id)}" aria-label="Permalink to ${esc(s.title)}">#</a>
          </div>
          <div class="grid">
            ${decks.map(d => `
              <a class="card${d.featured ? ' featured' : ''}" data-section="${esc(d.section)}" href="${esc(d.href)}">
                <div class="card-row">
                  <span class="tag">${esc(d.tag)}</span>
                  ${d.status ? `<span class="status ${esc(d.status)}">${esc(statusLabel(d.status))}</span>` : ''}
                </div>
                <h3>${esc(d.title)}</h3>
                <p>${esc(d.description)}</p>
                <div class="meta">
                  <span class="date">${esc(d.meta || fmtDate(d.date))}</span>
                  <span class="arrow">→</span>
                </div>
              </a>
            `).join('')}
          </div>
        `;
        sectionsEl.appendChild(section);
      });

      // ─── Collapsible chronological sections (one row visible) ──
      // Keeps only the cards that fit on the first visual row; the rest
      // collapse behind a "Show N earlier updates" toggle. Re-measures on
      // resize so "one row" stays true at any width.
      function setupCollapsibles() {
        document.querySelectorAll('section.decks[data-collapsible="1"]').forEach(sec => {
          if (sec.classList.contains('hidden')) return; // can't measure a hidden section
          const grid = sec.querySelector('.grid');
          if (!grid) return;
          const cards = Array.from(grid.children).filter(c => c.classList.contains('card'));
          if (!cards.length) return;
          const expanded = sec.dataset.expanded === '1';
          // Reset so measurement sees true layout.
          cards.forEach(c => c.classList.remove('collapsed'));
          const firstTop = cards[0].offsetTop;
          const firstRow = cards.filter(c => Math.abs(c.offsetTop - firstTop) < 4);
          const extra = cards.length - firstRow.length;

          let toggle = sec.querySelector('.section-toggle');
          if (extra <= 0) { if (toggle) toggle.remove(); return; }

          if (!expanded) {
            cards.forEach(c => { if (Math.abs(c.offsetTop - firstTop) >= 4) c.classList.add('collapsed'); });
          }
          if (!toggle) {
            toggle = document.createElement('button');
            toggle.className = 'section-toggle';
            toggle.type = 'button';
            toggle.addEventListener('click', () => {
              sec.dataset.expanded = sec.dataset.expanded === '1' ? '' : '1';
              setupCollapsibles();
            });
            sec.appendChild(toggle);
          }
          toggle.textContent = expanded
            ? 'Show fewer ▴'
            : `Show ${extra} earlier update${extra > 1 ? 's' : ''} ▾`;
        });
      }
      const runCollapsibles = () => requestAnimationFrame(setupCollapsibles);
      runCollapsibles();
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(runCollapsibles);
      let _rsz;
      window.addEventListener('resize', () => { clearTimeout(_rsz); _rsz = setTimeout(runCollapsibles, 150); });

      // ─── Filter chip wiring ────────────────────────────────────
      filters.addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
        const f = chip.dataset.filter;
        document.querySelectorAll('section.decks').forEach(sec => {
          sec.classList.toggle('hidden', f !== 'all' && sec.dataset.section !== f);
        });
        // When a single section is selected, jump to it.
        if (f !== 'all') {
          const target = document.getElementById(f);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        runCollapsibles(); // a section just became (in)visible — re-measure rows
      });

      // ─── ToC scroll-spy ────────────────────────────────────────
      const tocLinks = Array.from(tocList.querySelectorAll('a'));
      const setActive = id => tocLinks.forEach(a => a.classList.toggle('active', a.dataset.section === id));
      const sectionsForObserver = data.sections
        .map(s => document.getElementById(s.id))
        .filter(Boolean);
      const io = new IntersectionObserver(entries => {
        const visible = entries
          .filter(e => e.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
        if (visible[0]) setActive(visible[0].target.id);
      }, { rootMargin: '-15% 0px -65% 0px', threshold: 0 });
      sectionsForObserver.forEach(s => io.observe(s));
      if (sectionsForObserver[0]) setActive(sectionsForObserver[0].id);

      // ─── Deep-link to a filter via #hash on load ───────────────
      const hash = location.hash.replace('#', '');
      if (hash && data.sections.some(s => s.id === hash)) {
        const target = document.getElementById(hash);
        if (target) setTimeout(() => target.scrollIntoView({ behavior: 'auto', block: 'start' }), 50);
      }
    })();
  </script>
</body>
</html>
